<title>Aaron · Command Center</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#fbfcfe; --line:#e4e9f0;
    --text:#1c2530; --muted:#66717f; --faint:#9aa5b3;
    --accent:#2e5a88; --accent2:#4a82c0; --accent-soft:#e8f0f9;
    --good:#2e9e6b; --amber:#d9922b; --life:#7a5bd0;
    --shadow:0 1px 3px rgba(20,40,70,.06),0 6px 18px rgba(20,40,70,.05); --r:14px;
  }
  [data-theme="dark"]{
    --bg:#0e131a; --panel:#171f29; --panel2:#131a23; --line:#26313e;
    --text:#e7edf4; --muted:#93a1b1; --faint:#5f6d7d;
    --accent:#5b9bd8; --accent2:#7cb3e6; --accent-soft:#1a2734;
    --good:#4bbd87; --amber:#e0a54a; --life:#a389e6;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.28);
  }
  @media (prefers-color-scheme:dark){:root:not([data-theme]){
    --bg:#0e131a; --panel:#171f29; --panel2:#131a23; --line:#26313e;
    --text:#e7edf4; --muted:#93a1b1; --faint:#5f6d7d;
    --accent:#5b9bd8; --accent2:#7cb3e6; --accent-soft:#1a2734;
    --good:#4bbd87; --amber:#e0a54a; --life:#a389e6;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.28);
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 80px}
  header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-size:22px;margin:0;letter-spacing:-.3px}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--text);padding:7px 12px;border-radius:9px;transition:.15s}
  button:hover{border-color:var(--accent2);color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent2);color:#fff}
  button.ghost{background:transparent}
  .danger:hover{border-color:#d1495b;color:#d1495b}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
  .stat .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat .big{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:2px}
  .stat .big small{font-size:14px;color:var(--muted);font-weight:500}
  nav.views{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  nav.views button{border-radius:999px;padding:8px 16px}
  nav.views button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .days{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:9px 13px;text-align:center;min-width:92px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent2)}
  .chip.on{border-color:var(--accent);background:var(--accent-soft)}
  .chip.today{box-shadow:0 0 0 2px var(--accent2) inset}
  .chip .dn{font-weight:600;font-size:13px}
  .chip .dd{font-size:11px;color:var(--muted)}
  .chip .mini{margin-top:6px;height:5px;border-radius:3px;background:var(--line);overflow:hidden}
  .chip .mini>i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
  .card h2{margin:0 0 3px;font-size:18px}
  .card .tag{color:var(--muted);font-size:13px;margin-bottom:14px}
  .seclab{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);margin:16px 0 4px}
  ul.tasks{list-style:none;margin:0;padding:0}
  ul.tasks li{display:flex;align-items:flex-start;gap:11px;padding:8px 4px;border-bottom:1px solid var(--line)}
  ul.tasks li:last-child{border-bottom:0}
  .cb{flex:0 0 auto;width:20px;height:20px;border:2px solid var(--faint);border-radius:6px;margin-top:1px;cursor:pointer;display:grid;place-items:center;transition:.15s;background:transparent}
  .cb:hover{border-color:var(--accent)}
  .cb.done{background:var(--good);border-color:var(--good)}
  .cb.done::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;margin-top:7px}
  .dot.work{background:var(--accent)} .dot.health{background:var(--good)} .dot.life{background:var(--life)}
  .time{flex:0 0 auto;font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;min-width:42px;margin-top:2px}
  .tk{flex:1;min-width:0}
  .tk .txt{outline:none;border-radius:5px;padding:1px 3px}
  .tk .txt:focus{background:var(--accent-soft)}
  li.done .tk .txt{color:var(--muted);text-decoration:line-through}
  li.pers{opacity:.7} li.pers .tk .txt{font-style:italic}
  .star{color:var(--amber);font-size:13px;margin-left:5px}
  .nc{font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:0 4px;margin-left:6px}
  .rm{opacity:0;border:0;background:transparent;color:var(--faint);padding:2px 6px;font-size:16px;line-height:1}
  ul.tasks li:hover .rm{opacity:1}
  .rm:hover{color:#d1495b}
  .addrow{display:flex;gap:8px;margin-top:12px}
  .addrow input{flex:1;font:inherit;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:9px;padding:8px 11px;outline:none}
  .addrow input:focus{border-color:var(--accent2)}
  .note{margin-top:16px;border-top:1px dashed var(--line);padding-top:12px}
  .note label{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  .note textarea{width:100%;margin-top:6px;min-height:52px;font:inherit;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:10px;outline:none;resize:vertical}
  .proj{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
  .proj.complete{opacity:.72}
  .proj .head{display:flex;align-items:center;gap:12px}
  .proj .nm{font-size:16px;font-weight:650;flex:1;outline:none;border-radius:5px;padding:2px 4px}
  .proj .nm:focus{background:var(--accent-soft)}
  .proj.complete .nm{text-decoration:line-through;color:var(--muted)}
  .pct{font-variant-numeric:tabular-nums;font-weight:700;font-size:15px;color:var(--accent)}
  .proj.complete .pct{color:var(--good)}
  .bar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin:11px 0 4px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;transition:width .3s}
  .proj.complete .bar>i{background:var(--good)}
  ul.subs{list-style:none;margin:10px 0 0;padding:0}
  ul.subs li{display:flex;align-items:center;gap:10px;padding:6px 2px}
  ul.subs .txt{flex:1;outline:none;border-radius:5px;padding:1px 3px;font-size:14px}
  ul.subs li.done .txt{color:var(--muted);text-decoration:line-through}
  .cb.sm{width:17px;height:17px;border-radius:5px}
  .cb.sm.done::after{width:4px;height:8px}
  .pmeta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .pmeta button{font-size:12px;padding:5px 9px}
  .res h3{margin:2px 0 8px;font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .res a{display:block;color:var(--text);text-decoration:none;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;transition:.15s;background:var(--panel2)}
  .res a:hover{border-color:var(--accent2);color:var(--accent)}
  .res a small{display:block;color:var(--muted);font-size:12px;margin-top:1px}
  .hint{color:var(--faint);font-size:12.5px;margin:2px 0 16px}
  .empty{color:var(--faint);font-size:13px;padding:8px 2px}
  input[type=file]{display:none}

  @media(max-width:600px){
    .wrap{padding:max(16px,env(safe-area-inset-top)) 12px calc(70px + env(safe-area-inset-bottom))}
    h1{font-size:20px}
    .cb{width:25px;height:25px} .cb.sm{width:21px;height:21px}
    input,textarea,.tk .txt,.subs .txt,.proj .nm{font-size:16px !important}
    .stat{padding:13px;gap:11px} .stat .big{font-size:22px}
    button{padding:9px 12px}
    ul.tasks li{padding:11px 4px}
    body{-webkit-tap-highlight-color:transparent}
  }

  .ovl{display:none;position:fixed;inset:0;background:rgba(10,15,22,.55);z-index:50;align-items:center;justify-content:center;padding:16px}
  .ovlcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;max-width:520px;width:100%}
  .ovlcard h3{margin:0 0 4px} .ovlp{color:var(--muted);font-size:13px;margin:0 0 10px}
  #bkText{width:100%;height:170px;font:12px/1.4 monospace;border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--panel2);color:var(--text);resize:vertical;-webkit-user-select:text;user-select:text}
  .ovlrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

  .vartog{display:inline-flex;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:2px}
  .vartog button{border:0;background:transparent;padding:4px 12px;border-radius:7px;font-size:12px;color:var(--muted);cursor:pointer}
  .vartog button.on{background:var(--accent);color:#fff}
  .card h2{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div><h1>Command Center <a href="index.html" style="font-size:13px;font-weight:400;color:var(--accent);text-decoration:none;margin-left:8px">↩ all days</a></h1><div class="sub" id="weekLabel"></div></div>
    <div class="tools">

<script>
"use strict";
const KEY="ccplan_2026-07-23_v7";
function uid(){return Math.random().toString(36).slice(2,9);}

/* fixed daily rhythm & habits — regenerated per weekday (so Spanish/dance/chocolate re-anchor on slip) */
function fixedFor(iso,walkTime){
  const wd=new Date(iso+"T12:00:00").getDay(); const w=walkTime||"6:00";

}

function T(text,star,min,bucket){return {id:uid(),text,star:!!star,done:false,min:min||0,bucket:bucket||'work'};}

function seed(){

  ];

    {id:uid(),time:"10:25",text:"Supermaxi",cat:"life",done:false,min:60,bucket:'life'},

  ];
  const day={id:"thu23",date,active:'A',label:"Thursday · July 23",tag:"Walk → Preply (8:00) → Gym #1 · Supermaxi 10:25 · ganache 11:45 · tutoring 2–2:50 → clean supplies · walk → chocolate 4:25–5:55 → gym #3 · prep ~65/35 Preply/math.",tasks,fixed,altTag:"",altTasks:[],altFixed:[],note:""};
  return {meta:{weekLabel:"Today — Thursday, July 23, 2026"},days:[day],projects:[
    {id:uid(),name:"⭐ Preply — TOP PRIORITY (curriculum first; account in a few days)",done:false,subs:sub(["Build curriculum — lesson plans (now)","Prep first trial lessons","Create account + profile bio (in a few days)","Set rate","Set availability","TEFL cert alongside"])},

    {id:uid(),name:"CAD — robotic hand (portfolio)",done:false,subs:sub(["Scope the piece","Design fingers/joints","Full assembly","SolidWorks simulation","Renders + short writeup"])},
    {id:uid(),name:"Ecuador leads",done:false,subs:sub(["Vanessa (El Rosado) — message","Rafael Soria — email","Alfredo Valarezo — email","Follow up on replies"])},
    {id:uid(),name:"Colombia visa",done:false,subs:sub(["Gather documents","Contact rental / address","Submit application"])},
    {id:uid(),name:"Chocolate (El Gran Manual del Chocolatero)",done:false,subs:sub(["Work through recipes","Finish the manual"])},
    {id:uid(),name:"Learning to cook",done:false,subs:sub(["Pick a dish a week","Build a small repertoire"])}
  ]};
}

const RES=[
 {h:"Emails to send (see the Correos file)",items:[
   {t:"Rafael Soria — rsoriap@usfq.edu.ec",u:"mailto:rsoriap@usfq.edu.ec",d:"Spanish intro + short-call ask; attach CV"},
   {t:"Alfredo Valarezo — avalarezo@usfq.edu.ec",u:"mailto:avalarezo@usfq.edu.ec",d:"Spanish intro; lead with FEA / failure analysis"}]},
 {h:"Soria — read before the call",items:[
   {t:"⭐ Long-term deep decarbonisation pathways for Ecuador",u:"https://www.sciencedirect.com/science/article/pii/S2211467X21000237",d:"His core paper"},
   {t:"⭐ Impacto económico de la transición energética (IADB, ES)",u:"https://publications.iadb.org/publications/spanish/document/Impacto-economico-de-la-transicion-energetica-en-Ecuador.pdf",d:"Readable, Spanish"},
   {t:"Google Scholar — Soria",u:"https://scholar.google.com/citations?user=0CXDL7UAAAAJ&hl=en",d:""}]},
 {h:"Valarezo — read before the call",items:[
   {t:"⭐ Residual Stress in HV Impact Coatings: Parametric FEA",u:"https://link.springer.com/article/10.1007/s11666-020-01026-5",d:"Your FEA overlap"},
   {t:"High-temp erosion of hard coatings",u:"https://research.usfq.edu.ec/en/publications/high-temperature-erosion-mechanisms-and-erosion-rate-of-hard-coat/",d:"Failure/wear"},
   {t:"Google Scholar — Valarezo",u:"https://scholar.google.pl/citations?hl=en&user=DAJL0LIAAAAJ",d:""}]},
 {h:"El Rosado (context for Vanessa)",items:[
   {t:"Mi Comisariato / El Rosado — Wikipedia",u:"https://es.wikipedia.org/wiki/Mi_Comisariato",d:"Business units + scale"},
   {t:"El Rosado diversifica sus inversiones (El Universo)",u:"https://www.eluniverso.com/noticias/2019/09/12/nota/7514104/corporacion-rosado-diversifica-sus-inversiones/",d:"No public source confirms cattle — ask Vanessa"}]}
];

let S=load();
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return seed();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
let curDay=defaultDay();
function todayISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function defaultDay(){const t=todayISO();const m=S.days.find(d=>d.date===t);return m?m.id:S.days[0].id;}

function actT(d){return d.active==='B'?(d.altTasks||(d.altTasks=[])):d.tasks;}
function actF(d){return d.active==='B'?(d.altFixed||(d.altFixed=[])):(d.fixed||[]);}
function actTag(d){return d.active==='B'?(d.altTag||'Plan B — alternative day (add tasks below)'):(d.tag||'');}
function counted(d){return actT(d).concat(actF(d).filter(f=>!f.noCount));}
function dayPct(d){const it=counted(d);if(!it.length)return null;return Math.round(100*it.filter(t=>t.done).length/it.length);}
// Time-weighted work progress (by minutes). Buckets: 'preply' | 'work' (non-Preply work). 'life' items (walks/gym/errands) are not work.
function workPct(d,pred){const it=actT(d).concat(actF(d));let tot=0,done=0;it.forEach(x=>{if(!pred(x))return;const m=x.min||0;tot+=m;if(x.done)done+=m;});return tot?Math.round(100*done/tot):null;}
function totalWorkPct(d){return workPct(d,x=>x.bucket==='preply'||x.bucket==='work');}
function nonPreplyPct(d){return workPct(d,x=>x.bucket==='work');}
function preplyPct(d){return workPct(d,x=>x.bucket==='preply');}
function weekPct(){let a=0,b=0;S.days.forEach(d=>{const it=counted(d);a+=it.filter(t=>t.done).length;b+=it.length;});return b?Math.round(100*a/b):0;}
function projPct(p){if(p.done)return 100;if(!p.subs.length)return 0;return Math.round(100*p.subs.filter(s=>s.done).length/p.subs.length);}
function projAvg(){if(!S.projects.length)return 0;return Math.round(S.projects.reduce((s,p)=>s+projPct(p),0)/S.projects.length);}
function streak(){const t=todayISO();let n=0;const past=S.days.filter(d=>d.date<=t);for(let i=past.length-1;i>=0;i--){const p=dayPct(past[i]);if(p!==null&&p>=80)n++;else if(p!==null)break;}return n;}

function ring(pct,size){size=size||48;const r=(size-8)/2,c=2*Math.PI*r,off=c*(1-(pct||0)/100);
  let col="var(--accent)";if(pct===null)col="var(--line)";else if(pct>=100)col="var(--good)";else if(pct<34)col="var(--amber)";
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .4s"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="${size*0.28}" font-weight="700" fill="var(--text)">${pct===null?"–":pct}</text></svg>`;
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function render(){
  document.getElementById("weekLabel").textContent=S.meta.weekLabel;
  const d0=S.days.find(d=>d.id===curDay);
  const tw=totalWorkPct(d0),np=nonPreplyPct(d0),pr=preplyPct(d0);
  document.getElementById("ringTotal").innerHTML=ring(tw);document.getElementById("pctTotal").innerHTML=(tw===null?"—":tw+"<small>%</small>");
  document.getElementById("ringNonP").innerHTML=ring(np);document.getElementById("pctNonP").innerHTML=(np===null?"—":np+"<small>%</small>");
  document.getElementById("ringPreply").innerHTML=ring(pr);document.getElementById("pctPreply").innerHTML=(pr===null?"—":pr+"<small>%</small>");
  renderChips();renderDay();renderProjects();save();
}
function renderChips(){
  const t=todayISO();
  document.getElementById("dayChips").innerHTML=S.days.map(d=>{const p=dayPct(d),w=p===null?0:p;
    return `<div class="chip ${d.id===curDay?'on':''} ${d.date===t?'today':''}" data-day="${d.id}"><div class="dn">${esc(d.label.split(" · ")[0])}</div><div class="dd">${esc(d.label.split(" · ")[1]||"")}</div><div class="mini"><i style="width:${w}%"></i></div></div>`;
  }).join("");
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{curDay=c.dataset.day;render();});
}
function liTask(t){return `<li class="${t.done?'done':''}" data-id="${t.id}"><div class="cb ${t.done?'done':''}" data-act="toggle"></div><span class="dot work"></span><div class="tk"><span class="txt" contenteditable="true" data-act="edit">${esc(t.text)}</span>${t.star?'<span class="star">★</span>':''}</div><button class="rm" data-act="rm" title="Remove">×</button></li>`;}
function liFixed(f){return `<li class="${f.done?'done':''} ${f.noCount?'pers':''}" data-fid="${f.id}"><div class="cb ${f.done?'done':''}" data-fact="toggle"></div><span class="dot ${f.cat}"></span><span class="time">${esc(f.time||"")}</span><div class="tk"><span class="txt" contenteditable="true" data-fact="edit">${esc(f.text)}</span>${f.noCount?'<span class="nc">not counted</span>':''}</div><button class="rm" data-fact="rm">×</button></li>`;}
function renderDay(){
  const d=S.days.find(x=>x.id===curDay); if(!d.active)d.active='A';
  const TL=actT(d), FL=actF(d);
  const tasks=TL.map(liTask).join("")||'<div class="empty">No focus tasks — add one below.</div>';
  const fixed=FL.map(liFixed).join("");
  const tog=`<span class="vartog"><button data-v="A" class="${d.active==='A'?'on':''}">Plan A</button><button data-v="B" class="${d.active==='B'?'on':''}">Plan B</button></span>`;
  document.getElementById("dayPanel").innerHTML=`<div class="card"><h2>${esc(d.label)} ${tog}</h2><div class="tag">${esc(actTag(d))}</div>
    <div class="seclab">Focus (work)</div><ul class="tasks" id="tlist">${tasks}</ul>
    <div class="addrow"><input placeholder="Add a focus task… (Enter)" data-add="task"><button class="primary" data-add="taskbtn">Add</button></div>
    <div class="seclab">Rhythm &amp; habits</div><ul class="tasks" id="flist">${fixed}</ul>
    <div class="addrow"><input placeholder="Add a habit / block… (Enter)" data-add="fixed"><button data-add="fixedbtn">Add</button></div>
    <div class="note"><label>Notes — how did today go?</label><textarea data-note>${esc(d.note||"")}</textarea></div></div>`;
  const P=document.getElementById("dayPanel");
  P.querySelectorAll('.vartog button').forEach(b=>b.onclick=()=>{d.active=b.dataset.v;render();});
  P.querySelectorAll('#tlist li').forEach(li=>{const t=TL.find(x=>x.id===li.dataset.id);
    li.querySelector('[data-act="toggle"]').onclick=()=>{t.done=!t.done;render();};
    const sp=li.querySelector('[data-act="edit"]');sp.onblur=()=>{t.text=sp.textContent.trim()||t.text;save();};sp.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();sp.blur();}};
    li.querySelector('[data-act="rm"]').onclick=()=>{const a=actT(d);a.splice(a.indexOf(t),1);render();};});
  P.querySelectorAll('#flist li').forEach(li=>{const f=FL.find(x=>x.id===li.dataset.fid);
    li.querySelector('[data-fact="toggle"]').onclick=()=>{f.done=!f.done;render();};
    const sp=li.querySelector('[data-fact="edit"]');sp.onblur=()=>{f.text=sp.textContent.trim()||f.text;save();};sp.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();sp.blur();}};
    li.querySelector('[data-fact="rm"]').onclick=()=>{const a=actF(d);a.splice(a.indexOf(f),1);render();};});
  const it=P.querySelector('[data-add="task"]');const addT=()=>{const v=it.value.trim();if(!v)return;actT(d).push(T(v,false));render();};
  it.onkeydown=e=>{if(e.key==="Enter")addT();};P.querySelector('[data-add="taskbtn"]').onclick=addT;
  const iff=P.querySelector('[data-add="fixed"]');const addF=()=>{const v=iff.value.trim();if(!v)return;actF(d).push({id:uid(),time:"",text:v,cat:"life",done:false});render();};
  iff.onkeydown=e=>{if(e.key==="Enter")addF();};P.querySelector('[data-add="fixedbtn"]').onclick=addF;
  const ta=P.querySelector("[data-note]");ta.oninput=()=>{d.note=ta.value;save();};
}

function renderProjects(){
  const box=document.getElementById("projList");
  if(!S.projects.length){box.innerHTML='<div class="empty">No projects yet.</div>';return;}
  box.innerHTML=S.projects.map(p=>{const pct=projPct(p);
    const subs=p.subs.map(s=>`<li class="${s.done?'done':''}" data-sid="${s.id}"><div class="cb sm ${s.done?'done':''}" data-sact="toggle"></div><span class="txt" contenteditable="true" data-sact="edit">${esc(s.text)}</span><button class="rm" data-sact="rm">×</button></li>`).join("");
    return `<div class="proj ${p.done?'complete':''}" data-pid="${p.id}"><div class="head"><span class="nm" contenteditable="true" data-pact="name">${esc(p.name)}</span><span class="pct">${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div><ul class="subs">${subs}</ul><div class="addrow"><input placeholder="Add subtask… (Enter)" data-padd="sub"><button data-padd="subbtn">Add</button></div><div class="pmeta"><button data-pact="toggle">${p.done?"↩ Reopen":"✓ Mark complete"}</button><button class="danger" data-pact="del">Delete project</button></div></div>`;
  }).join("");
  box.querySelectorAll(".proj").forEach(el=>{const p=S.projects.find(x=>x.id===el.dataset.pid);
    const nm=el.querySelector('[data-pact="name"]');nm.onblur=()=>{p.name=nm.textContent.trim()||p.name;save();};nm.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();nm.blur();}};
    el.querySelector('[data-pact="toggle"]').onclick=()=>{p.done=!p.done;render();};
    el.querySelector('[data-pact="del"]').onclick=()=>{S.projects=S.projects.filter(x=>x.id!==p.id);render();};
    el.querySelectorAll("li").forEach(li=>{const s=p.subs.find(x=>x.id===li.dataset.sid);
      li.querySelector('[data-sact="toggle"]').onclick=()=>{s.done=!s.done;if(s.done)p.done=false;render();};
      const sp=li.querySelector('[data-sact="edit"]');sp.onblur=()=>{s.text=sp.textContent.trim()||s.text;save();};sp.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();sp.blur();}};
      li.querySelector('[data-sact="rm"]').onclick=()=>{p.subs=p.subs.filter(x=>x.id!==s.id);render();};});
    const inp=el.querySelector('[data-padd="sub"]');const add=()=>{const v=inp.value.trim();if(!v)return;p.subs.push({id:uid(),text:v,done:false});p.done=false;render();};
    inp.onkeydown=e=>{if(e.key==="Enter")add();};el.querySelector('[data-padd="subbtn"]').onclick=add;});
}

document.querySelectorAll("nav.views button").forEach(b=>b.onclick=()=>{document.querySelectorAll("nav.views button").forEach(x=>x.classList.remove("on"));b.classList.add("on");["week","projects","resources"].forEach(v=>document.getElementById("view-"+v).hidden=(v!==b.dataset.view));});

document.getElementById("newProj").onkeydown=e=>{if(e.key==="Enter")document.getElementById("addProj").click();};
function showBackupOverlay(json){
  let o=document.getElementById("bkOverlay");
  if(!o){o=document.createElement("div");o.id="bkOverlay";o.className="ovl";
    o.innerHTML='<div class="ovlcard"><h3>Your backup</h3><p class="ovlp">Tap <b>Copy</b> and paste it to Claude, or <b>Share / Save</b> the file.</p><textarea id="bkText" readonly></textarea><div class="ovlrow"><button class="primary" id="bkCopy">Copy</button><button id="bkShare">Share / Save file</button><button id="bkClose">Close</button></div></div>';
    document.body.appendChild(o);}
  const ta=o.querySelector("#bkText"); ta.value=json; o.style.display="flex"; ta.focus(); ta.select();
  const cb=o.querySelector("#bkCopy"); cb.textContent="Copy";
  cb.onclick=async()=>{try{await navigator.clipboard.writeText(json);}catch(e){ta.select();try{document.execCommand("copy");}catch(_){}}cb.textContent="Copied \u2713";};
  o.querySelector("#bkClose").onclick=()=>{o.style.display="none";};
  o.querySelector("#bkShare").onclick=async()=>{const fname="command-center-backup-"+todayISO()+".json";
    try{const file=new File([json],fname,{type:"application/json"});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:fname});return;}}catch(e){}
    try{const blob=new Blob([json],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){}};
}
document.getElementById("exportBtn").onclick=()=>{try{showBackupOverlay(JSON.stringify(S,null,2));}catch(e){}};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=JSON.parse(r.result);curDay=defaultDay();render();}catch(err){}};r.readAsText(f);};

function shiftISO(iso,delta){const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+delta);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function labelFor(iso){const d=new Date(iso+"T12:00:00");return WD[d.getDay()]+" · "+MO[d.getMonth()]+" "+d.getDate();}
function weekLabelFrom(days){const da=new Date(days[0].date+"T12:00:00"),db=new Date(days[days.length-1].date+"T12:00:00");return "Week of "+MO[da.getMonth()]+" "+da.getDate()+" – "+db.getDate()+", "+db.getFullYear()+"  ·  "+WD[da.getDay()]+" → "+WD[db.getDay()];}
let slipArm=false;
document.getElementById("slipBtn").onclick=function(){
  if(!slipArm){slipArm=true;this.textContent="Confirm slip →";setTimeout(()=>{if(slipArm){slipArm=false;this.textContent="⏭ Slip a day";}},3000);return;}
  S.days.forEach(day=>{day.date=shiftISO(day.date,1);day.label=labelFor(day.date);day.fixed=fixedFor(day.date);
    day.tag=(day.tag||"").split(" · ").filter(seg=>{const p=seg.toLowerCase();return !(p.includes("spanish")||p.includes("dance")||p.includes("optional her"));}).join(" · ");});
  S.meta.weekLabel=weekLabelFrom(S.days);slipArm=false;this.textContent="⏭ Slip a day";curDay=defaultDay();render();
};
let resetArm=false;
document.getElementById("resetBtn").onclick=function(){if(!resetArm){resetArm=true;this.textContent="Click again to reset";setTimeout(()=>{resetArm=false;this.textContent="Reset week";},3000);return;}S=seed();curDay=defaultDay();render();this.textContent="Reset week";resetArm=false;};
document.getElementById("themeBtn").onclick=()=>{const cur=document.documentElement.getAttribute("data-theme");const next=cur==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",next);try{localStorage.setItem(KEY+"_theme",next);}catch(e){}};
try{const th=localStorage.getItem(KEY+"_theme");if(th)document.documentElement.setAttribute("data-theme",th);}catch(e){}

renderRes();render();
</script>
</body>
